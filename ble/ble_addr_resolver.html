<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLE Random Address Resolver</title>
<script type="text/javascript" src="../page.js"></script>
<style type="text/css">

    display: block;
    margin: 0.2em 0;
}

#input {
    box-sizing: border-box;
    width: 100%;
    height: 10em;
    margin: 0.2em 0;
    padding: 0.2em;
    font-family: monospace;
    white-space: pre;
}

#output {
    box-sizing: border-box;
    width: 100%;
    margin: 0;
    border: 1px solid black;
    padding: 0.2em;
    overflow-x: auto;
}

<script type="text/javascript">
"use strict";

genericPageSetup.extra_menu_buttons = [
    ['demo_button', 'Insert demo data', 'demo()'],
    ['up_button', 'Back to overview', 'location.href="index.html"']
    ];

function assert(test_id, condition)
{
    if (!condition) {
        console.error('Self-test ' + test_id + ' failed');
        throw 'Self-test ' + test_id + ' failed';
    } else {
        console.info('Self-test ' + test_id + ' passed');
    }
}

/**
 * Converts a string containing any number of hex-digit pairs (separated by anything or nothing) to a byte array.
 *
 * @param {string} hex_string Input string.
 * @returns {Uint8Array} Output byte array.
 */
function hex_to_bytes(hex_string)
{
    const hex_pairs = hex_string.match(/[\da-fA-F]{2}/g) || [];
    return new Uint8Array(hex_pairs.map(hp => parseInt(hp, 16)));
}

/**
 * Converts a byte array to a hex string, optionally inserting separators between groups of bytes.
 *
 * @param {Uint8Array} bytes Input byte array.
 * @param {string} sep Optional separator string to insert between groups (default: single space).
 * @param {Array<number>} group_sizes Optional array of integers which cyclically specify the group sizes in bytes
 *                                    (default: [1], i.e. 1 byte per group for all groups).
 * @returns {string} Output hex string.
 */
function bytes_to_hex(bytes, sep=' ', group_sizes=[1])
{
    console.assert(group_sizes instanceof Array, 'group_sizes must be an Array');
    console.assert(group_sizes.length > 0, 'group_sizes must have at least one element');
    const hex_groups = [];
    const hex_group = [];
    let group_size_index = 0;
    let group_size = group_sizes[group_size_index];
    for (const byte of bytes) {
        hex_group.push(byte.toString(16).padStart(2, '0'));
        group_size--;
        if (group_size <= 0) {
            hex_groups.push(hex_group.join(''));
            hex_group.length = 0;
            group_size_index = (group_size_index + 1) % group_sizes.length;
            group_size = group_sizes[group_size_index];
        }
    }
    if (hex_group.length > 0) {
        hex_groups.push(hex_group.join(''));
    }
    return hex_groups.join(sep);
}

/**
 * This is the security function "e" defined in BT Core spec v5.2 vol 3 part H section 2.2.1 (also the HCI_LE_Encrypt
 * command defined in BT Core v5.2 vol 4 part E section 7.8.22). Performs simple AES-128 encryption of 128-bit data,
 * i.e. ECB mode.
 *
 * @param {Uint8Array} key 16-byte AES key (big-endian).
 * @param {Uint8Array} plain_text_data 16-byte plaintext block (big-endian).
 * @returns {Promise<Uint8Array>} 16-byte ciphertext block (big-endian).
 */
async function e(key, plain_text_data)
{
    console.assert(key.length == 16, 'key must be 16 bytes');
    console.assert(plain_text_data.length == 16, 'plain_text_data must be 16 bytes');
    // The built-in Crypto library has no API for ECB mode, so instead we use the available CTR mode and bypass the CTR
    // functionality by using all zeroes as the CTR plain text and the actual plain text as the CTR counter. This works
    // because:
    //      ECB mode (desired):   output = AES-128(key, plain_text_data)
    //      CTR mode (available): output = plain_text_data XOR AES-128(key, counter)
    const ctr_counter = plain_text_data;
    const ctr_plain_text = new Uint8Array(16); // all-zeroes
    // Import the key into a CryptoKey object
    const key_encoded = await window.crypto.subtle.importKey(
        "raw",
        key.buffer,
        "AES-CTR",
        false,
        ["encrypt", "decrypt"],
    );
    // Do the AES encryption
    const encrypted_data = new Uint8Array(await window.crypto.subtle.encrypt(
        {
            name: "AES-CTR",
            counter: ctr_counter,
            length: 64 // size in bits of the actual counter portion of counter, the rest is nonce; irrelevant here
        },
        key_encoded,
        ctr_plain_text
    ));
    return encrypted_data;
}

/**
 * This is the random address hash function "ah" defined in BT Core spec v5.2 vol 3 part H section 2.2.2.
 *
 * @param {Uint8Array} k 16-byte key (big-endian).
 * @param {Uint8Array} r 3-byte random value (big-endian).
 * @returns {Promise<Uint8Array>} 3-byte hash value (big-endian).
 */
async function ah(k, r)
{
    console.assert(k.length == 16, 'k must be 16 bytes');
    console.assert(r.length == 3, 'r must be 3 bytes');
    const r_prime = new Uint8Array(16); // all-zeroes
    r_prime.set(r, 13);
    return (await e(k, r_prime)).slice(-3);
}

/**
 * Checks if a given address is a resolvable private random address (BT Core v5.2 vol 6 part B section 1.3.2.2).
 *
 * @param {Uint8Array} addr 6-byte address (big-endian).
 * @returns {boolean} True if the addr is a resolvable private random address, else false.
 */
function is_resolvable_address(addr)
{
    console.assert(addr.length == 6, 'addr must be 6 bytes');
    const prand_rand_int = ((addr[0] << 16) | (addr[1] << 8) | addr[2]) & 0x3FFFFF;
    return (addr[0] & 0xC0) == 0x40 && prand_rand_int != 0 && prand_rand_int != 0x3FFFFF;
}

/**
 * Resolves a random address against a list of IRKs.
 *
 * @param {Uint8Array} addr 6-byte random address (big-endian).
 * @param {Array<Uint8Array>} irks Array of 16-byte IRKs (big-endian).
 * @returns {Promise<Array<Uint8Array>>} Array of matching IRKs (input IRKs are referenced, not copied).
 */
async function resolve_address(addr, irks)
{
    const matching_irks = [];
    for (const irk of irks) {
        const prand = addr.slice(0, 3);
        const addr_hash = addr.slice(3, 6);
        const computed_hash = await ah(irk, prand);
        if (computed_hash.every((byte, index) => byte == addr_hash[index])) {
            matching_irks.push(irk);
        }
    }
    return matching_irks;
}

async function self_test()
{
    // Test vector for e() from FIPS-197 Appendix C.1
    {
        const key = new Uint8Array([
            0x00, 0x01, 0x02, 0x03, 0x04, 0x05, 0x06, 0x07, 0x08, 0x09, 0x0a, 0x0b, 0x0c, 0x0d, 0x0e, 0x0f
        ]);
        const plain_text = new Uint8Array([
            0x00, 0x11, 0x22, 0x33, 0x44, 0x55, 0x66, 0x77, 0x88, 0x99, 0xaa, 0xbb, 0xcc, 0xdd, 0xee, 0xff
        ]);
        const expected_e = new Uint8Array([
            0x69, 0xc4, 0xe0, 0xd8, 0x6a, 0x7b, 0x04, 0x30, 0xd8, 0xcd, 0xb7, 0x80, 0x70, 0xb4, 0xc5, 0x5a
        ]);
        const actual_e = await e(key, plain_text);
        assert(1.1, actual_e.every((byte, index) => byte === expected_e[index]));
    }
    // Test vector for ah() from BT Core v5.2 vol 3 part H appendix D.7
    {
        const irk = new Uint8Array([
            0xec, 0x02, 0x34, 0xa3, 0x57, 0xc8, 0xad, 0x05, 0x34, 0x10, 0x10, 0xa6, 0x0a, 0x39, 0x7d, 0x9b
        ]);
        const prand = new Uint8Array([0x70, 0x81, 0x94]);
        const expected_ah = new Uint8Array([0x0d, 0xfb, 0xaa]);
        const actual_ah = await ah(irk, prand);
        assert(2.1, actual_ah.every((byte, index) => byte === expected_ah[index]));
    }
    // Test is_resolvable_address()
    {
        // Valid RPA
        assert(3.1, is_resolvable_address(hex_to_bytes('40:01:02:32:e3:93')) === true);
        // Non-RPA (2 MSBs not 0b01)
        assert(3.2, is_resolvable_address(hex_to_bytes('00:01:02:03:04:05')) === false);
        // Invalid RPA (prand all zeroes)
        assert(3.3, is_resolvable_address(hex_to_bytes('40:00:00:22:c7:05')) === false);
        // Invalid RPA (prand all ones)
        assert(3.4, is_resolvable_address(hex_to_bytes('7f:ff:ff:70:43:99')) === false);
    }
    // Test resolve_address()
    {
        const irks = [
            hex_to_bytes('00010203:04050607:08090A0B:0C0D0E0F'),
            hex_to_bytes('c0ca938922c729ccd3f4984d382b4bfe'),
            hex_to_bytes('088D58EEBCF53855F79CE5070B57AD7F'),
        ];
        const addrs = [
            hex_to_bytes('40:01:02:32:e3:93'),
            hex_to_bytes('0x6d674a50da5a'),
        ];
        const expected_matches = [
            [irks[0]],
            [irks[1], irks[2]],
        ];
        for (let i = 0; i < addrs.length; i++) {
            const test_id = `4.${i + 1}`;
            const actual_matches = await resolve_address(addrs[i], irks);
            const expected_matches_i = expected_matches[i];
            assert(test_id,
                actual_matches.length === expected_matches_i.length &&
                // Both actual and expected match arrays contain references to the original IRKs, so we just compare
                // the referenced IRKs with "===" instead of comparing them byte-by-byte
                actual_matches.every((irk, j) => irk === expected_matches_i[j]));
        }
    }
    console.info('All self-tests passed');
}

let input_elem;
let output_elem;

function process_input()
{
    // Read input lines and remove comments (from '#' to end of line)
    const input_lines = input_elem.value.split('\n').map(line => line.split('#')[0]);

    let output_html = '';
    const addresses = [];
    const irks = [];
    for (const line of input_lines) {
        const bytes = hex_to_bytes(line);
        if (bytes.length === 6) {
            addresses.push(bytes);
        } else if (bytes.length === 16) {
            irks.push(bytes);
        } else if (bytes.length > 0) {
            output_html += `Ignoring invalid bytes: ${bytes_to_hex(bytes)}.<br>`;
        }
    }
    if (addresses.length == 0) {
        output_html += 'No RPAs provided.<br>';
    }
    if (irks.length == 0) {
        output_html += 'No IRKs provided.<br>';
    }
    if (addresses.length > 0 && irks.length > 0) {
        addresses.forEach(async (addr) => {
            const addr_str = bytes_to_hex(addr, ':');
            if (!is_resolvable_address(addr)) {
                output_html += `WARNING: RPA ${addr_str} is invalid.<br>`;
            }
            const matching_irks = await resolve_address(addr, irks);
            if (matching_irks.length == 0) {
                output_html += `FAILURE: RPA ${addr_str} matches no IRK.<br>`;
            } else {
                matching_irks.forEach((irk) => {
                    output_html += `SUCCESS: RPA ${addr_str} matches IRK ${bytes_to_hex(irk, ':', [2])}<br>`;
                });
            }
            output_elem.innerHTML = output_html;
        });
    }
    output_elem.innerHTML = output_html;
}

async function demo()
{
    if (input_elem.value.trim().length > 0 && !confirm('Overwrite existing input with demo data?')) return;
    input_elem.value = `# Demo data
40:01:02:32:e3:93       # RPA matching IRK 1
6d674a50da5a            # RPA matching IRKs 2 and 3
0x78, 0x9abc, 0xdef012  # RPA matching no IRK

00010203-04050607-08090A0B-0C0D0E0F  # IRK 1
c0ca938922c729ccd3f4984d382b4bfe     # IRK 2
088D58EEBCF53855   F79CE5070B57AD7F  # IRK 3`;
    process_input();
}

async function init()
{
    try {
        await self_test();
    } catch (e) {
        document.getElementById('content').innerHTML = 'Initialization failed';
        alert(e);
        return;
    }

    input_elem = document.getElementById('input');
    output_elem = document.getElementById('output');
    input_elem.addEventListener('input', process_input, false);
    process_input();
    input_elem.focus();
}

window.addEventListener('load', init, false);
</script>
</head>

<body>

<div class="hcontainer">

<h1>BLE Random Address Resolver</h1>

<div class="box" id="content">

<label class="label" for="input">Input 6-byte resolvable private random addresses (RPAs) and 16-byte identity resolving
keys (IRKs) on separate lines - as hex-digit pairs separated by anything or nothing (or try demo in menu):</label>
<textarea id="input"></textarea>

<p class="label">Results:</p>
<pre id="output"></pre>
</div>

</div>

</body>
